<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Retail ETL Portfolio Project</title>
  <desc id="desc">A banner-style cover image for the project README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.08 0 1 0 0 0.92 0 0 1 0 0.78 0 0 0 0.9 0"/>
    </filter>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>
  <circle cx="190" cy="110" r="90" fill="#22c55e" opacity="0.14" filter="url(#glow)"/>
  <circle cx="1040" cy="410" r="120" fill="#38bdf8" opacity="0.12" filter="url(#glow)"/>
  <rect x="70" y="68" width="1060" height="384" rx="28" fill="#0b1220" opacity="0.64" stroke="#334155"/>

  <text x="118" y="165" fill="#e2e8f0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" letter-spacing="3">PORTFOLIO PROJECT 01</text>
  <text x="118" y="235" fill="#ffffff" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="58" font-weight="700">Retail ETL Pipeline</text>
  <text x="118" y="282" fill="#cbd5e1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="24">Batch data engineering project with cleaning, SQL modeling and reporting.</text>

  <rect x="118" y="330" width="160" height="42" rx="21" fill="#123b2d" stroke="#22c55e"/>
  <text x="138" y="358" fill="#bbf7d0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">ETL + SQL</text>

  <rect x="290" y="330" width="200" height="42" rx="21" fill="#10293a" stroke="#38bdf8"/>
  <text x="310" y="358" fill="#dbeafe" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">SQLite Warehouse</text>

  <rect x="504" y="330" width="190" height="42" rx="21" fill="#23163a" stroke="#a78bfa"/>
  <text x="524" y="358" fill="#ede9fe" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">Testing &amp; QA</text>

  <path d="M780 138h250" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M780 184h188" stroke="#64748b" stroke-width="2"/>
  <path d="M780 220h220" stroke="#64748b" stroke-width="2"/>
  <path d="M780 256h158" stroke="#64748b" stroke-width="2"/>
  <path d="M780 292h196" stroke="#64748b" stroke-width="2"/>

  <rect x="772" y="120" width="290" height="238" rx="20" fill="#111827" stroke="#334155"/>
  <rect x="796" y="150" width="242" height="22" rx="11" fill="#1f2937"/>
  <rect x="796" y="188" width="220" height="16" rx="8" fill="#1f2937"/>
  <rect x="796" y="224" width="190" height="16" rx="8" fill="#1f2937"/>
  <rect x="796" y="260" width="242" height="16" rx="8" fill="#1f2937"/>
  <rect x="796" y="296" width="160" height="16" rx="8" fill="#1f2937"/>

  <circle cx="1006" cy="187" r="10" fill="#22c55e"/>
  <circle cx="966" cy="223" r="10" fill="#38bdf8"/>
  <circle cx="1040" cy="295" r="10" fill="#a78bfa"/>
</svg>

