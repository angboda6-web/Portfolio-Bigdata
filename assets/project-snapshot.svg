<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Pipeline Snapshot</title>
  <desc id="desc">A visual summary of the latest project outputs and KPIs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="560" fill="url(#bg)"/>

  <text x="64" y="78" fill="#0f172a" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="34" font-weight="700">Latest pipeline snapshot</text>
  <text x="64" y="112" fill="#475569" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">Generated from the current SQLite warehouse and report artifacts.</text>

  <rect x="64" y="150" width="330" height="140" rx="22" fill="url(#card)" stroke="#cbd5e1"/>
  <text x="92" y="194" fill="#0f172a" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">Completed orders</text>
  <text x="92" y="244" fill="#16a34a" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="50" font-weight="700">576</text>

  <rect x="435" y="150" width="330" height="140" rx="22" fill="url(#card)" stroke="#cbd5e1"/>
  <text x="463" y="194" fill="#0f172a" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">Revenue</text>
  <text x="463" y="244" fill="#0284c7" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="50" font-weight="700">250,075.86</text>

  <rect x="806" y="150" width="330" height="140" rx="22" fill="url(#card)" stroke="#cbd5e1"/>
  <text x="834" y="194" fill="#0f172a" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">Top category</text>
  <text x="834" y="244" fill="#7c3aed" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="50" font-weight="700">Fitness</text>

  <rect x="64" y="334" width="1072" height="160" rx="28" fill="#0f172a" stroke="#1e293b"/>
  <text x="92" y="382" fill="#e2e8f0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20" font-weight="700">Top products</text>

  <text x="92" y="426" fill="#cbd5e1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">1. Yoga Mat  |  Fitness  |  205 units</text>
  <text x="92" y="454" fill="#cbd5e1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">2. Mouse     |  Electronics  |  177 units</text>
  <text x="92" y="482" fill="#cbd5e1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">3. Face Serum |  Beauty  |  163 units</text>

  <text x="768" y="426" fill="#cbd5e1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">Best customer: Sara Perez</text>
  <text x="768" y="454" fill="#cbd5e1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">City: Zaragoza</text>
  <text x="768" y="482" fill="#cbd5e1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">LTV: 7,433.74</text>
</svg>

