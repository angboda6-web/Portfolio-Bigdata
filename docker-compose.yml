services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolio_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  pipeline:
    build: .
    profiles: ["pipeline"]
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:change_me@postgres:5432/portfolio_db
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "main.py", "run", "--verbose", "--database-url", "postgresql+psycopg://postgres:change_me@postgres:5432/portfolio_db"]

  dashboard:
    build: .
    profiles: ["dashboard"]
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:change_me@postgres:5432/portfolio_db
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    command:
      [
        "streamlit",
        "run",
        "streamlit_app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
      ]

volumes:
  pgdata:
